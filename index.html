<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Payment Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --paid: #e8f5e9; --unpaid: #ffebee; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* Login Screen */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box { background: white; padding: 35px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 280px; }
        .login-box input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-size: 20px; }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Main App */
        #main-app { display: none; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .search-box input { padding: 12px; border: 2px solid var(--primary); border-radius: 8px; width: 250px; }
        
        .table-wrapper { overflow-x: auto; border: 1px solid #444; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; font-size: 14px; }
        th { background: #444; color: white; text-transform: uppercase; }
        
        .row-paid { background-color: var(--paid) !important; }
        .row-unpaid { background-color: var(--unpaid) !important; }
        
        input.t-in { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 14px; background: white; }
        .sn-cell { font-weight: bold; color: #d32f2f; }
        input[type="checkbox"] { transform: scale(1.4); cursor: pointer; }

        .summary-box { margin: 20px 0; padding: 20px; background: #333; color: white; border-radius: 8px; display: flex; justify-content: space-around; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .btn { padding: 12px 22px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-row { background: #2e7d32; }
        .btn-month { background: #ff9800; color: #000; }
        .btn-pdf { background: #c62828; }
        .btn-reset { background: #546e7a; }
        .btn-logout { background: #212121; }

        /* PDF Styles */
        .pdf-mode .controls, .pdf-mode .top-bar { display: none !important; }
        .pdf-mode table { border: 2.5px solid black !important; }
        .pdf-mode th, .pdf-mode td { border: 1.5px solid black !important; color: black !important; background: white !important; font-weight: bold !important; }
        .pdf-mode input { border: none !important; }
        .pdf-mode .pdf-tick::after { content: '✔'; font-weight: bold; font-size: 16px; }
        .pdf-mode input[type="checkbox"] { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3>SECURE LOGIN</h3>
        <input type="password" id="passInput" placeholder="PIN" onkeydown="if(event.key==='Enter') verify()">
        <button onclick="verify()">Login</button>
    </div>
</div>

<div id="main-app">
    <div class="container" id="printable-area">
        <div class="top-bar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search..." oninput="render()"></div>
            <button class="btn btn-logout" onclick="location.reload()">Logout</button>
        </div>

        <h2 style="text-align:center; color:var(--primary); margin:0 0 20px 0;">Payment Tracker</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="headerRow">
                        <th style="width:50px">No.</th><th style="width:60px">SN</th><th style="width:150px">Reg No.</th><th>Name</th><th style="width:100px">Amount</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="summary-box">
            <div>Paid Count: <span id="totalStudents">0</span></div>
            <div>Total: LKR <span id="totalCash">0</span></div>
        </div>

        <div class="controls">
            <button class="btn btn-row" onclick="addNewRow()">+ Add Row</button>
            <button class="btn btn-month" onclick="addNewMonth()">+ Add Month</button>
            <button class="btn btn-pdf" onclick="generatePDF()">Download PDF</button>
            <button class="btn btn-reset" onclick="secureReset()">Reset All</button>
        </div>
    </div>
</div>

<script>
    const PASS = "2003";
    let months = JSON.parse(localStorage.getItem('m_v_smooth')) || ["March"];
    let students = JSON.parse(localStorage.getItem('s_v_smooth')) || [];
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function verify() {
        if (document.getElementById('passInput').value === PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(students.length === 0) addNewRow();
            render();
        } else { alert("Incorrect PIN!"); }
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const header = document.getElementById('headerRow');
        header.innerHTML = `<th style="width:50px">No.</th><th style="width:60px">SN</th><th style="width:150px">Reg No.</th><th>Name</th><th style="width:100px">Amount</th>`;
        months.forEach(m => header.innerHTML += `<th style="width:100px">${m}</th>`);

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        let cash = 0, paid = 0;

        students.forEach((s, idx) => {
            if (s.name.toLowerCase().includes(query) || s.reg.toLowerCase().includes(query)) {
                let isPaid = s.payments.some(p => p === true);
                if(isPaid) paid++;
                s.payments.forEach(p => { if(p) cash += s.amount; });

                const row = document.createElement('tr');
                row.className = isPaid ? "row-paid" : "row-unpaid";
                row.innerHTML = `
                    <td>${idx + 1}</td>
                    <td class="sn-cell">${s.sn || ''}</td>
                    <td><input type="text" class="t-in r-in" value="${s.reg}" oninput="handleReg(${idx}, this.value)" onkeydown="nav(event, ${idx}, 'reg')"></td>
                    <td><input type="text" class="t-in n-in" value="${s.name}" oninput="update(${idx}, 'name', this.value)" onkeydown="nav(event, ${idx}, 'name')"></td>
                    <td><input type="number" class="t-in" value="${s.amount}" oninput="update(${idx}, 'amount', this.value)" onkeydown="nav(event, ${idx}, 'amt')"></td>
                `;
                months.forEach((m, mIdx) => {
                    const tick = s.payments[mIdx] ? 'pdf-tick' : '';
                    row.innerHTML += `<td class="${tick}"><input type="checkbox" ${s.payments[mIdx] ? 'checked' : ''} onclick="toggle(${idx}, ${mIdx})"></td>`;
                });
                tbody.appendChild(row);
            }
        });
        document.getElementById('totalStudents').innerText = paid;
        document.getElementById('totalCash').innerText = cash.toLocaleString();
    }

    function handleReg(idx, val) {
        if (!val.startsWith("23EE0")) val = "23EE0";
        students[idx].reg = val;
        let suffix = val.replace("23EE0", "");
        if (suffix.length >= 3) {
            students[idx].sn = parseInt(suffix.substring(0,3)) - 250;
            save(); render();
            // Jump to Name
            const names = document.querySelectorAll('.n-in');
            if(names[idx]) names[idx].focus();
        } else {
            students[idx].sn = "";
            save(); 
            // Update SN cell without re-rendering everything to keep cursor
            document.querySelectorAll('.sn-cell')[idx].innerText = "";
        }
    }

    function update(idx, f, v) { students[idx][f] = (f==='amount')?parseInt(v)||0:v; save(); updateSummary(); }
    function toggle(sIdx, mIdx) { students[sIdx].payments[mIdx] = !students[sIdx].payments[mIdx]; save(); render(); }
    function save() { localStorage.setItem('s_v_smooth', JSON.stringify(students)); localStorage.setItem('m_v_smooth', JSON.stringify(months)); }

    function addNewRow() {
        students.push({ reg: "23EE0", sn: "", name: "", amount: 100, payments: new Array(months.length).fill(false) });
        save(); render();
        setTimeout(() => {
            const regs = document.querySelectorAll('.r-in');
            const el = regs[regs.length - 1];
            el.focus();
            el.setSelectionRange(el.value.length, el.value.length); // Put cursor at end
        }, 50);
    }

    function nav(e, idx, f) {
        if (e.key === "Enter") {
            const row = document.querySelectorAll('#tableBody tr')[idx];
            if (f === 'reg') row.querySelector('.n-in').focus();
            else if (f === 'name') row.querySelector('input[type="number"]').focus();
            else addNewRow();
        }
    }

    function addNewMonth() {
        let last = months[months.length-1];
        months.push(monthNames[(monthNames.indexOf(last)+1)%12]);
        students.forEach(s => s.payments.push(false));
        save(); render();
    }

    function updateSummary() {
        let cash = 0, paid = 0;
        students.forEach(s => {
            if(s.payments.some(p => p === true)) paid++;
            s.payments.forEach(p => { if(p) cash += s.amount; });
        });
        document.getElementById('totalStudents').innerText = paid;
        document.getElementById('totalCash').innerText = cash.toLocaleString();
    }

    function secureReset() {
        if (prompt("PIN:") === PASS) { localStorage.clear(); location.reload(); }
    }

    function generatePDF() {
        const el = document.getElementById('printable-area');
        el.classList.add('pdf-mode');
        html2pdf().set({ margin:0.3, filename:'Report.pdf', jsPDF:{orientation:'landscape'} }).from(el).save().then(()=>el.classList.remove('pdf-mode'));
    }
</script>
</body>
</html>
